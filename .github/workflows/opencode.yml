name: opencode
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    concurrency:
      # Concurrency control: Ensures only one instance of OpenCode runs per PR/Issue.
      # If a new command is triggered (e.g., another "/oc" comment), the previous pending run is canceled.
      group: ${{ github.workflow }}-${{ github.event.issue.number || github.run_id }}
      cancel-in-progress: true
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install code-review-graph
        run: |
          pip install code-review-graph
          code-review-graph install --platform opencode
      - name: Build code-review-graph
        run: code-review-graph build
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Setup configuration
        run: |
          mkdir -p ~/.config/opencode
          curl -sL https://gist.githubusercontent.com/mccxj/c23c72d3b4e891dd36866c2b32eda3d8/raw/AGENTS.md -o ~/.config/opencode/AGENTS.md
          curl -sL https://gist.githubusercontent.com/mccxj/1d5e8c7f107af7db59a2c2ace6bd949c/raw/opencode.jsonc -o ~/.config/opencode/opencode.jsonc
          curl -sL https://gist.githubusercontent.com/mccxj/6698d7e99d2eda81602fd276e03a200d/raw/oh-my-openagent.json -o ~/.config/opencode/oh-my-openagent.json
      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          API_KEY: ${{ secrets.API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
        with:
          model: ${{ secrets.DEFAULT_MODEL || 'x-openai/ark-code-latest' }}
